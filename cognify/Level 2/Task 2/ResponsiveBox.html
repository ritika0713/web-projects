<!DOCTYPE html>
<html>
<head>
    <title>Responsive Box</title>
    <style>
        .box {
            width: 400px;
            margin: 20px auto;
            background: lightblue;
            padding: 20px;
            text-align: center;
        }
        @media (max-width:600px){
            .box {
                width: 100%;
                background: lightgreen;
            }
        }
    </style>
</head>
<body>

    <h2>Responsive Box Example</h2>
    <div class="box">
        <p>This box changes style when screen size is smaller.</p>
    </div>

</body>
</html>
