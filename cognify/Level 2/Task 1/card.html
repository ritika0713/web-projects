<!DOCTYPE html>
<html>
<head>
    <title>Card Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <h2 style="text-align:center; margin-top:20px;">Card Example</h2>

    <div style="text-align:center;">
        <div class="card" style="width: 18rem; margin:auto;">
            <img src="https://www.w3schools.com/w3images/lights.jpg" class="card-img-top" alt="Fixed Image">
            <div class="card-body">
                <h5>My Card</h5>
                <p>This is a simple card.</p>
            </div>
        </div>
    </div>
</body>
</html>
