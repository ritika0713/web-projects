<html>
<head>
  <title>Slideshow</title>
  <style>
    body{margin:0;font-family:Arial;text-align:center}
    .slideshow{max-width:500px;margin:auto;position:relative;height:300px}
    .slideshow img{width:100%;height:300px;object-fit:cover;position:absolute;left:0;top:0;opacity:0;animation:slide 9s infinite}
    .slideshow img:nth-child(1){animation-delay:0s}
    .slideshow img:nth-child(2){animation-delay:3s}
    .slideshow img:nth-child(3){animation-delay:6s}
    @keyframes slide{
      0%{opacity:0}
      10%{opacity:1}
      30%{opacity:1}
      40%{opacity:0}
      100%{opacity:0}
    }
  </style>
</head>
<body>
  <h2>Image Slideshow</h2>
  <div class="slideshow">
    <img src="https://picsum.photos/id/1015/500/300">
    <img src="https://picsum.photos/id/1016/500/300">
    <img src="https://picsum.photos/id/1018/500/300">
  </div>
</body>
</html>
